# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x
        
    - name: Restore dependencies
      run: dotnet restore
      
    - name: Build
      run: dotnet build --no-restore
      
    - name: Test
      run: dotnet test --no-build --verbosity normal

    - name: Publish
      run: dotnet publish -c Release -o ./publish --no-build
      
    - name: List directory contents
      run: ls -la /home/runner/work/

    - name: List directory contents
      run: ls -la ./

    - name: List directory contents
      run: ls -la ./WebAppApi48Core

    - name: List directory contents
      run: ls -la ./WebAppApi48Core/bin
      
    - name: List directory contents
      run: ls -la ./WebAppApi48Core/bin/Release

    - name: List directory contents
      run: ls -la ./WebAppApi48Core/bin/Release/net9.0

    - name: List directory contents
      run: ls -la ./WebAppApi48Core/bin/Release/net9.0/publish
      
    - name: Deploy via rsync
      uses: easingthemes/ssh-deploy@main
      with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ARGS: "-avz --no-times --delete"
          SOURCE: "WebAppApi48Core/bin/Release/net9.0/publish"
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          TARGET: /home/brian/MedicationTaperingWebAPIArtifact
